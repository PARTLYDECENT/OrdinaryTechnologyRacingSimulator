<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDF Raymarched Car in Babylon.js</title>
    <!-- Tailwind CSS for futuristic dashboard UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babylon.js core engine CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- Custom styling stylesheet -->
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <div id="canvasZone">
        <canvas id="renderCanvas"></canvas>
    </div>

    <!-- UI Overlay Dashboard -->
    <div class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 md:p-6 z-10">
        
        <!-- Header Panel -->
        <div class="flex justify-end items-start w-full pointer-events-auto">
            
            <!-- Controls Quick Toggle -->
            <div class="glass-panel p-3 rounded-xl flex items-center gap-4">
                <button id="btnDayNight" class="pointer-events-auto bg-orange-500/20 hover:bg-orange-500/40 text-orange-400 border border-orange-500/50 px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all duration-300">
                    Switch to Day Mode
                </button>
                <button id="btnAutopilot" class="pointer-events-auto bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/50 px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all duration-300 neon-shadow-orange">
                    Autopilot: ON
                </button>
                <button id="btnAudio" class="pointer-events-auto bg-cyan-500/20 hover:bg-cyan-500/40 text-cyan-400 border border-cyan-500/50 px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest transition-all duration-300">
                    🔊 Synth Sound: OFF
                </button>
            </div>
        </div>

        <!-- Middle Info Indicator (Shows up when user overrides Autopilot) -->
        <div id="manualOverrideToast" class="self-center glass-panel px-4 py-2 rounded-full text-xs font-semibold text-orange-400 border border-orange-500/30 opacity-0 transition-opacity duration-500 shadow-lg">
            ⚡ MANUAL SYSTEM ENGAGED
        </div>

        <!-- Bottom Dashboard Layout -->
        <div class="flex flex-col md:flex-row justify-between items-end gap-4 w-full">
            
            <!-- Digital Speedometer HUD -->
            <div class="glass-panel p-4 rounded-xl flex items-center justify-between gap-6 pointer-events-auto w-full md:w-64 border-l-4 border-l-orange-500">
                <div class="flex flex-col">
                    <span class="text-gray-400 text-xxs uppercase tracking-widest font-bold">Velocity Gauge</span>
                    <div class="flex items-baseline gap-1 mt-1">
                        <span id="speedValue" class="text-white text-4xl font-black font-mono tracking-tighter text-orange-500">0</span>
                        <span class="text-gray-400 text-sm font-bold uppercase">MPH</span>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <span id="gearValue" class="bg-red-500/20 text-red-400 border border-red-500/30 px-2 py-0.5 rounded text-xs font-bold">GEAR: D</span>
                    <span class="text-gray-400 text-xxs font-mono">RPM: <span id="rpmValue">1200</span></span>
                </div>
            </div>

            <!-- Touch Controls (Visible only on mobile/touch interfaces) -->
            <div class="flex justify-between items-center w-full md:w-auto md:hidden pointer-events-auto gap-4">
                <!-- Steering Pad -->
                <div class="flex gap-2">
                    <button id="btnLeft" class="w-14 h-14 rounded-xl glass-panel text-white text-2xl font-bold flex items-center justify-center active:bg-orange-500/40 active:border-orange-400">◀</button>
                    <button id="btnRight" class="w-14 h-14 rounded-xl glass-panel text-white text-2xl font-bold flex items-center justify-center active:bg-orange-500/40 active:border-orange-400">▶</button>
                </div>
                <!-- Pedals Pad -->
                <div class="flex gap-2">
                    <button id="btnBrake" class="w-14 h-14 rounded-xl glass-panel text-rose-400 text-xl font-bold flex items-center justify-center active:bg-rose-500/40 active:border-rose-400">BRAK</button>
                    <button id="btnGas" class="w-14 h-14 rounded-xl glass-panel text-amber-400 text-xl font-bold flex items-center justify-center active:bg-amber-500/40 active:border-amber-400">GAS</button>
                </div>
            </div>

            <!-- Controls Info Card (Desktop) -->
            <div class="hidden md:flex glass-panel p-4 rounded-xl flex-col gap-1 pointer-events-auto w-64">
                <h4 class="text-white text-xs font-bold uppercase tracking-wider text-orange-400">Flight Manual</h4>
                <div class="grid grid-cols-2 gap-x-2 gap-y-1 text-gray-400 text-xs mt-1 font-mono">
                    <div>W / Up Arrow</div><div class="text-white">Accelerate</div>
                    <div>S / Down</div><div class="text-white">Reverse/Brake</div>
                    <div>A / D</div><div class="text-white">Steer Left/Right</div>
                    <div>Spacebar</div><div class="text-white">Handbrake</div>
                    <div>R key</div><div class="text-white">Reset Physics</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Script Section -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
